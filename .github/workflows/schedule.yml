name: Daily News Push

on:
  schedule:
    # 09:30 Beijing Time = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily news bot
        env:
          ALAPI_TOKEN: ${{ secrets.ALAPI_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py
